# CI — WebComms & Pay (PLAN.md §5). Least-privilege + SHA-pinned actions.
#
# This is a PUBLIC repo holding (when configured) a Supabase service-role key and
# Stripe keys. CI therefore:
#   * runs with `permissions: contents: read` (top-level, least privilege),
#   * pins every action to a commit SHA (not a mutable tag) — supply-chain,
#   * never exposes a DB credential on fork PRs (the typegen-staleness guard is
#     gated on a repo secret that forks cannot read).
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-audit:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Audit (high+)
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4.2.2 — full history for a complete scan
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      # gitleaks/gitleaks-action@v2.3.7
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # Typegen-staleness guard. Cloud-only repo: there is no local Supabase stack in
  # CI, so this regenerates types from the dev/stg project and fails if the
  # committed src/types/database.ts is stale. It requires SUPABASE_ACCESS_TOKEN,
  # which forks CANNOT read — so the job is SKIPPED on fork PRs (no token leak)
  # and runs only on same-repo pushes/PRs. Points at dev/stg, never prod.
  typegen-staleness:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      # actions/setup-node@v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Regenerate types from dev/stg and diff
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set — skipping typegen guard."
            exit 0
          fi
          npm run db:types
          git diff --exit-code src/types/database.ts \
            || (echo "::error::src/types/database.ts is stale. Run 'npm run db:types' and commit." && exit 1)
